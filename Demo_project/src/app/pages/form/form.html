<div class="container py-4">
  <h2 class="mb-4">Add User</h2>

  @if (submitted) {
    <div class="alert alert-success">User added! Redirecting to list...</div>
  }

  <form (ngSubmit)="onSubmit()">
    <div class="mb-3">
      <label for="name" class="form-label">Name *</label>
      <input type="text" class="form-control" id="name" [(ngModel)]="name" name="name" placeholder="Enter name" required>
    </div>
    <div class="mb-3">
      <label for="email" class="form-label">Email *</label>
      <input type="email" class="form-control" id="email" [(ngModel)]="email" name="email" placeholder="Enter email" required>
    </div>
    <div class="mb-3">
      <label for="phone" class="form-label">Phone</label>
      <input type="tel" class="form-control" id="phone" [(ngModel)]="phone" name="phone" placeholder="Enter phone number">
    </div>
    <div class="mb-3">
      <label for="company" class="form-label">Company</label>
      <input type="text" class="form-control" id="company" [(ngModel)]="company" name="company" placeholder="Enter company">
    </div>
    <div class="mb-3">
      <label for="role" class="form-label">Role</label>
      <select class="form-select" id="role" [(ngModel)]="role" name="role">
        <option value="Admin">Admin</option>
        <option value="Editor">Editor</option>
        <option value="Viewer">Viewer</option>
      </select>
    </div>
    <div class="d-flex gap-2">
      <button type="button" class="btn btn-secondary" (click)="onCancel()">Cancel</button>
      <button type="submit" class="btn btn-primary" [disabled]="!name || !email">Add User</button>
    </div>
  </form>
</div>
