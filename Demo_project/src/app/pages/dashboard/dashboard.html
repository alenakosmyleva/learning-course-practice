<div class="container py-4">
  <h2 class="mb-4">Dashboard</h2>
  @if (stats$ | async; as stats) {
    <div class="row g-4">
      @for (stat of stats; track stat.label) {
        <div class="col-md-6 col-lg-3">
          <div class="card">
            <div class="card-body">
              <h6 class="card-subtitle mb-3" style="font-size: 14px; font-weight: 700">{{ stat.label }}</h6>
              <h3 class="card-title mb-0" style="line-height: 1">{{ stat.value }}</h3>
              <small style="display: block; margin-top: 4px">
                @if (stat.change !== null) {
                  <span [style.color]="stat.change >= 0 ? '#198754' : '#dc3545'">{{ stat.change >= 0 ? '+' : '' }}{{ stat.change }}%</span>
                  <span class="text-body-secondary"> {{ stat.subtitle }}</span>
                } @else {
                  <span class="text-body-secondary">{{ stat.subtitle }}</span>
                }
              </small>
            </div>
          </div>
        </div>
      }
    </div>
  }
</div>
