<nav class="navbar navbar-expand-lg" data-bs-theme="dark" style="background-color: #333333">
  <div class="container">
    <span class="navbar-brand" style="cursor: pointer" (click)="toggleDebugPanel()" title="Open debug panel">Demo Project</span>
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav"
      aria-controls="navbarNav"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/list" routerLinkActive="active">Users</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/onboarding" routerLinkActive="active">Add User</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/settings" routerLinkActive="active">Settings</a>
        </li>
      </ul>
      <div class="ms-auto d-flex align-items-center">
        <select
          class="form-select form-select-sm"
          (change)="onUserChange($event)"
          aria-label="Current user"
        >
          <option value="" [selected]="(currentUserId$ | async) === null">No user</option>
          @for (user of users$ | async; track user.id) {
            <option [value]="user.id" [selected]="user.id === (currentUserId$ | async)">{{ user.name }}</option>
          }
        </select>
      </div>
    </div>
  </div>
</nav>

<router-outlet />

<app-debug-panel
  [isOpen]="debugPanelOpen"
  (closePanel)="debugPanelOpen = false"
/>
